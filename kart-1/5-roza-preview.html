<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosalia LBD — Сайт-платформа</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #F7F8F5;
  --milk:   #F6F3F1;
  --rose:   #CFA7A5;
  --rose-d: #B88F8E;
  --steel:  #2878B5;
  --text:   #2E2E2E;
  --text2:  rgba(46,46,46,0.68);
  --border: rgba(40,120,181,0.15);
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Cormorant Garamond', serif;
  color: var(--text);
}

/* ── Header ── */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  background: rgba(247,248,245,0.94);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; color: var(--steel);
  text-decoration: none; transition: opacity 0.2s;
}
.back-btn:hover { opacity: 0.7; }

/* ── Step badge ── */
.step-badge {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 9;
  height: 28px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  background: rgba(246,243,241,0.93);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(184,143,142,.18);
  font-family: system-ui, sans-serif;
  font-size: 0.68rem; letter-spacing: 0.1em;
}
.step-dots { color: #CFA7A5; letter-spacing: 0.22em; font-size: 0.58rem; }
.step-label { color: #6A5A58; font-weight: 500; }
.step-story { color: #B88F8E; text-decoration: none; transition: opacity 0.2s; }
.step-story:hover { opacity: 0.65; }
.step-action {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0 0.7rem; height: 20px; border-radius: 10px;
  background: #B88F8E; color: #fff;
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em;
  text-decoration: none; transition: background 0.2s;
}
.step-action:hover { background: #9A7170; }

/* ── Page ── */
.page {
  height: calc(100vh - 84px);
  margin-top: 84px;
  display: flex;
  flex-direction: column;
}

/* ── Description ── */
.desc {
  max-width: 520px;
  text-align: center;
  padding: 2rem 1.5rem 0;
}
.desc-label {
  font-size: 0.9rem; color: var(--rose-d);
  letter-spacing: 0.06em; margin-bottom: 0.5rem;
}
.desc-title {
  font-size: 1.8rem; color: var(--text);
  line-height: 1.2; margin-bottom: 0.75rem;
}
.desc-sub {
  font-size: 1.1rem; color: var(--text2); line-height: 1.55;
  margin-bottom: 1.2rem;
}
.open-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 1.4rem;
  background: var(--rose-d); color: #fff;
  border-radius: 50px; font-family: inherit;
  font-size: 1rem; text-decoration: none;
  transition: background 0.2s, transform 0.2s;
}
.open-btn:hover { background: #9A7170; transform: translateY(-1px); }

/* ── Browser mockup ── */
.browser-wrap {
  width: min(860px, 92vw);
  flex-shrink: 0;
}
.browser-shell {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
  border: 1px solid rgba(0,0,0,0.12);
}
.browser-bar {
  height: 40px;
  background: #E8E5E2;
  display: flex; align-items: center;
  padding: 0 1rem; gap: 0.5rem;
}
.browser-dots { display: flex; gap: 6px; }
.browser-dot {
  width: 12px; height: 12px; border-radius: 50%;
}
.browser-dot:nth-child(1) { background: #FF5F57; }
.browser-dot:nth-child(2) { background: #FFBD2E; }
.browser-dot:nth-child(3) { background: #28C840; }
.browser-url {
  flex: 1; max-width: 320px; margin: 0 auto;
  background: #fff; border-radius: 6px;
  height: 24px; display: flex; align-items: center;
  padding: 0 0.75rem;
  font-family: system-ui, sans-serif;
  font-size: 0.72rem; color: #666;
  letter-spacing: 0.02em;
}
.browser-screen {
  width: 100%; height: 520px;
  background: var(--milk);
  position: relative; overflow: hidden;
}
.browser-screen iframe {
  width: 100%; height: 100%;
  border: none; display: block;
}

/* ── Tags ── */
.tech-tags {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  justify-content: center;
  max-width: 480px; padding: 0 1rem;
}
.tech-tag {
  padding: 0.25rem 0.75rem;
  border-radius: 50px;
  border: 1px solid rgba(184,143,142,0.3);
  background: rgba(207,167,165,0.08);
  font-size: 1rem; color: var(--text2);
}

@media (max-width: 600px) {
  .browser-screen { height: 340px; }
  .top-bar { padding: 0 1rem; }
  .desc { padding: 1.5rem 1rem 0; }
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="../index.html#projects" class="back-btn">← Назад</a>
  <span style="display:inline-flex;align-items:center;gap:0.55rem;">
    <img src="../reka-odna.png" style="height:36px;width:auto;" alt="">
    <span style="display:inline-flex;align-items:baseline;gap:0.4em;">
      <span style="font-family:'Cinzel',serif;font-weight:500;font-size:1.0rem;letter-spacing:0.12em;color:#2878B5;">Yaselda</span>
      <span style="font-family:'Cinzel',serif;font-weight:500;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:#2878B5;">Studio</span>
    </span>
  </span>
  <span></span>
</div>
<div class="step-badge">
  <span class="step-dots">● ● ● ● ●</span>
  <span class="step-label">Компонент 5 · Платформа</span>
  <a href="0-story.html" class="step-story">← История проекта</a>
  <a href="https://roza-beta.vercel.app" target="_blank" class="step-action">Открыть сайт →</a>
</div>

<div class="page">

  <iframe src="https://roza-beta.vercel.app" loading="lazy" title="Rosalia LBD — сайт" style="width:100%;flex:1;border:none;display:block;"></iframe>

</div>

</body>
</html>
